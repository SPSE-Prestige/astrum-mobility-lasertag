services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-lasertag}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  prisma-migrate:
    build:
      context: .
      dockerfile: Dockerfile.prisma
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "wait-for-postgres postgres 5432 30 2 && npx prisma migrate deploy"

  prisma-seed:
    build:
      context: .
      dockerfile: Dockerfile.prisma
    env_file: .env
    depends_on:
      prisma-migrate:
        condition: service_completed_successfully
    command: >
      sh -c "npx prisma db seed"

volumes:
  pgdata:
