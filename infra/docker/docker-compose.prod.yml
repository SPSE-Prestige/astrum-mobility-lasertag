## ─────────────────────────────────────────────
##  Laser Tag — Production
##  Usage:  docker compose -f docker/docker-compose.prod.yml up --build -d
## ─────────────────────────────────────────────
name: aimtec2026-lasertag

services:
  # ── Data stores ──
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: ../../.env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - lasertag

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru --save ""
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - lasertag

  mosquitto:
    image: eclipse-mosquitto:2-openssl
    restart: unless-stopped
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquittodata:/mosquitto/data
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "healthcheck", "-W", "3"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - lasertag

  # ── Migrations & Seed ──
  prisma-migrate:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.migrate
    env_file: ../../.env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lasertag

  prisma-seed:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.seed
    env_file: ../../.env
    depends_on:
      prisma-migrate:
        condition: service_completed_successfully
    networks:
      - lasertag

  # ── Backend API ──
  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ../../.env
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_ADDR=redis:6379
      - MQTT_BROKER=tcp://mosquitto:1883
    depends_on:
      prisma-seed:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    networks:
      - lasertag

  # ── Web Dashboard ──
  web:
    build:
      context: ../../web
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8080
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_started
    networks:
      - lasertag

  # ── Nginx Reverse Proxy ──
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      backend:
        condition: service_started
      web:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - lasertag

volumes:
  pgdata:
  redisdata:
  mosquittodata:
  nginx_logs:

networks:
  lasertag:
    driver: bridge
