## ─────────────────────────────────────────────
##  Laser Tag — Development overrides
##  Usage:  docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
## ─────────────────────────────────────────────

services:
  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_ADDR=redis:6379
    volumes:
      - ../../backend:/src
    # V dev módu se doporučuje spouštět Go přímo na hostu (hot-reload s air)
    # a nechat jen DB + Redis v kontejnerech.

  web:
    build:
      context: ../../web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - NODE_ENV=development
    volumes:
      - ../../web:/app
      - web_node_modules:/app/node_modules
      - /app/.next
    command: ["sh", "-c", "npm install && npm run dev"]

volumes:
  web_node_modules:
