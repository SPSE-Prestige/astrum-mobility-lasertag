services:
  postgres:
    image: postgres:16-alpine
    env_file: ../.env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - lasertag

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - lasertag

  prisma-migrate:
    build:
      context: ..
      dockerfile: docker/Dockerfile.migrate
    env_file: ../.env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lasertag

  prisma-seed:
    build:
      context: ..
      dockerfile: docker/Dockerfile.seed
    env_file: ../.env
    depends_on:
      prisma-migrate:
        condition: service_completed_successfully
    networks:
      - lasertag

volumes:
  pgdata:
  redisdata:

networks:
  lasertag:
    driver: bridge
