## ─────────────────────────────────────────────
##  Laser Tag — Base Compose (shared services)
## ─────────────────────────────────────────────
name: aimtec2026-lasertag

services:
  # ── Data stores ──
  postgres:
    image: postgres:16-alpine
    env_file: ../../.env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - lasertag

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - lasertag

  # ── Migrations & Seed ──
  prisma-migrate:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.migrate
    env_file: ../../.env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lasertag

  prisma-seed:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.seed
    env_file: ../../.env
    depends_on:
      prisma-migrate:
        condition: service_completed_successfully
    networks:
      - lasertag

  # ── Backend API ──
  backend:
    env_file: ../../.env
    depends_on:
      prisma-seed:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - lasertag

  # ── Web Dashboard ──
  web:
    env_file: ../../.env
    depends_on:
      backend:
        condition: service_started
    networks:
      - lasertag

volumes:
  pgdata:
  redisdata:

networks:
  lasertag:
    driver: bridge
